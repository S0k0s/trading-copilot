name: Ενημέρωση δεδομένων μετοχών

on:
  schedule:
    # 21:30 UTC, Δευ-Παρ (~λίγο μετά το κλείσιμο NYSE/NASDAQ)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scanner
        run: python scanner/scan.py

      - name: Commit & push αν άλλαξε κάτι
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Καμία αλλαγή στο data.json."
          else
            git commit -m "Auto-update stock data $(date -u +%Y-%m-%d)"
            git push
          fi
